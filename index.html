<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="favicon.png">
    </head>
    <body>
<!--genuinally the dumbest and worst looking calcualtor ever but it works and I'll revise it later-->
        <div class="calculator-div">
            <table class="calculator-buttons">

                <tr class="cal-row">
                    <td colspan="4" class="cal-display" id="display">0</td>
                </tr>
                <tr class="cal-row">
                    <td class="buttonvr">D</td>
                    <td class="buttonvr">R</td>
                    <td class="buttonvr">%</td>
                    <td class="buttonvr">/</td>
                </tr>
                <tr class="cal-row">
                    <td class="buttonvr">7</td>
                    <td class="buttonvr">8</td>
                    <td class="buttonvr">9</td>
                    <td class="buttonvr">*</td>
                </tr>
                <tr class="cal-row">
                    <td class="buttonvr">4</td>
                    <td class="buttonvr">5</td>
                    <td class="buttonvr">6</td>
                    <td class="buttonvr">-</td>
                </tr>
                <tr class="cal-row">
                    <td class="buttonvr">1</td>
                    <td class="buttonvr">2</td>
                    <td class="buttonvr">3</td>
                    <td class="buttonvr">+</td>
                </tr>
                <tr class="cal-row">
                    <td colspan="2" class="buttonvr">F</td>
                    <td colspan="2" class="buttonvr">0</td>
                    <td class="buttonvr">.</td>
                    <td class="buttonvr">=</td>
                </tr>
            </table>
        </div>

        <footer>
            Calculator go vroom vrrrom | not meant to be stylish but for a time of bordom
        </footer>

        <script src="script.js"></script>
    </body>
</html>
